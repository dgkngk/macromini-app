<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MacroMini</title>
    <!-- Keeping Tailwind CDN for simplicity in this migration -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
    </style>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.body.innerHTML = `
          <div style="padding: 20px; color: red; font-family: sans-serif; background: white;">
            <h1>Startup Error</h1>
            <p><strong>Message:</strong> ${message}</p>
            <p><strong>Source:</strong> ${source}:${lineno}</p>
            <pre style="background: #eee; padding: 10px; overflow: auto;">${error ? error.stack : 'No stack trace'}</pre>
          </div>
        `;
        console.error("Global Error Caught:", message, error);
      };

      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML = `
          <div style="padding: 20px; color: red; font-family: sans-serif; background: white;">
            <h1>Unhandled Promise Rejection</h1>
            <p><strong>Reason:</strong> ${event.reason}</p>
          </div>
        `;
        console.error("Unhandled Rejection:", event.reason);
      });
    </script>
</head>
  <body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
