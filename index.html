<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MacroMini</title>
    <!-- Keeping Tailwind CDN for simplicity in this migration -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
    </style>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        // Clear existing body content
        document.body.innerHTML = '';

        var container = document.createElement('div');
        container.style.padding = '20px';
        container.style.color = 'red';
        container.style.fontFamily = 'sans-serif';
        container.style.background = 'white';

        var title = document.createElement('h1');
        title.textContent = 'Startup Error';
        container.appendChild(title);

        var messagePara = document.createElement('p');
        var messageStrong = document.createElement('strong');
        messageStrong.textContent = 'Message:';
        messagePara.appendChild(messageStrong);
        messagePara.appendChild(document.createTextNode(' ' + String(message)));
        container.appendChild(messagePara);

        var sourcePara = document.createElement('p');
        var sourceStrong = document.createElement('strong');
        sourceStrong.textContent = 'Source:';
        sourcePara.appendChild(sourceStrong);
        sourcePara.appendChild(
          document.createTextNode(' ' + String(source) + ':' + String(lineno))
        );
        container.appendChild(sourcePara);

        var pre = document.createElement('pre');
        pre.style.background = '#eee';
        pre.style.padding = '10px';
        pre.style.overflow = 'auto';
        pre.textContent = error && error.stack ? String(error.stack) : 'No stack trace';
        container.appendChild(pre);

        document.body.appendChild(container);

        console.error("Global Error Caught:", message, error);
      };

      window.addEventListener('unhandledrejection', function(event) {
        // Clear existing body content
        document.body.innerHTML = '';

        var container = document.createElement('div');
        container.style.padding = '20px';
        container.style.color = 'red';
        container.style.fontFamily = 'sans-serif';
        container.style.background = 'white';

        var title = document.createElement('h1');
        title.textContent = 'Unhandled Promise Rejection';
        container.appendChild(title);

        var reasonPara = document.createElement('p');
        var reasonStrong = document.createElement('strong');
        reasonStrong.textContent = 'Reason:';
        reasonPara.appendChild(reasonStrong);
        reasonPara.appendChild(document.createTextNode(' ' + String(event.reason)));
        container.appendChild(reasonPara);

        document.body.appendChild(container);
        console.error("Unhandled Rejection:", event.reason);
      });
    </script>
</head>
  <body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
