<div class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-900 px-4 transition-colors">
  <div class="max-w-md w-full bg-white dark:bg-slate-800 rounded-2xl shadow-xl overflow-hidden border border-slate-100 dark:border-slate-700">
    
    <div class="p-8">
      <div class="flex flex-col items-center mb-8">
        <div class="bg-indigo-600 text-white p-3 rounded-xl shadow-lg mb-4">
          <lucide-icon [name]="icons.ChefHat" [size]="32" />
        </div>
        <h1 class="text-3xl font-bold text-slate-800 dark:text-white tracking-tight">MacroMini</h1>
        <p class="text-slate-500 dark:text-slate-400 mt-2 text-center">
          {{ isLogin() ? 'Welcome back! Sign in to continue.' : 'Start your journey to better health.' }}
        </p>
      </div>

      <div *ngIf="error()" class="mb-6 p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl text-red-600 dark:text-red-400 text-sm flex items-center gap-2">
        <div class="w-1.5 h-1.5 rounded-full bg-red-500"></div>
        {{ error() }}
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
        
        <div *ngIf="!isLogin()">
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Name</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <lucide-icon [name]="icons.User" [size]="18" />
            </div>
            <input 
              type="text" 
              formControlName="name"
              class="block w-full pl-10 pr-3 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 dark:text-white transition-all outline-none"
              placeholder="Your Name"
            >
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <lucide-icon [name]="icons.Mail" [size]="18" />
            </div>
            <input 
              type="email" 
              formControlName="email"
              class="block w-full pl-10 pr-3 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 dark:text-white transition-all outline-none"
              placeholder="you@example.com"
            >
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <lucide-icon [name]="icons.Lock" [size]="18" />
            </div>
            <input 
              type="password" 
              formControlName="password"
              class="block w-full pl-10 pr-3 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 dark:text-white transition-all outline-none"
              placeholder="••••••••"
            >
          </div>
        </div>

        <button 
          type="submit" 
          [disabled]="loading()"
          class="w-full flex items-center justify-center py-3 px-4 rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 shadow-lg shadow-indigo-500/30 transition-all font-medium disabled:opacity-70 disabled:cursor-not-allowed mt-2"
        >
          <lucide-icon *ngIf="loading()" [name]="icons.Loader2" [class]="'animate-spin mr-2'" [size]="20" />
          {{ isLogin() ? 'Sign In' : 'Create Account' }}
          <lucide-icon *ngIf="!loading()" [name]="icons.ArrowRight" [class]="'ml-2'" [size]="18" />
        </button>
      </form>

      <div class="mt-6">
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400">Or continue with</span>
          </div>
        </div>

        <div class="mt-6 grid grid-cols-2 gap-3">
          <button 
            type="button"
            (click)="handleGoogleLogin()"
            [disabled]="loading()"
            class="w-full inline-flex justify-center py-2.5 px-4 rounded-xl shadow-sm bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-50 dark:hover:bg-slate-600 focus:outline-none transition-all"
          >
            <svg class="h-5 w-5 mr-2" viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google
          </button>
          
          <button 
            type="button"
            (click)="handleGuestLogin()"
            [disabled]="loading()"
            class="w-full inline-flex justify-center py-2.5 px-4 rounded-xl shadow-sm bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-sm font-medium text-slate-700 dark:text-white hover:bg-slate-50 dark:hover:bg-slate-600 focus:outline-none transition-all"
          >
            Guest
          </button>
        </div>
      </div>

      <p class="mt-8 text-center text-sm text-slate-500 dark:text-slate-400">
        {{ isLogin() ? "Don't have an account?" : "Already have an account?" }}
        <button 
          (click)="toggleMode()"
          class="font-medium text-indigo-600 hover:text-indigo-500 dark:text-indigo-400 dark:hover:text-indigo-300 ml-1 focus:outline-none"
        >
          {{ isLogin() ? 'Sign up' : 'Sign in' }}
        </button>
      </p>
    </div>
  </div>
</div>
